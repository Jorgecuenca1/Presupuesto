<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPRE - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0e3449 0%, #1a5276 50%, #2980b9 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff; border-radius: 1rem; padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,.3); max-width: 420px; width: 100%;
        }
        .login-card .logo { text-align: center; margin-bottom: 1.5rem; }
        .login-card .logo h2 { color: #1a5276; font-weight: 700; letter-spacing: 3px; }
        .login-card .logo p { color: #7f8c8d; font-size: .88rem; }
        .login-card .form-control:focus { border-color: #1a5276; box-shadow: 0 0 0 .2rem rgba(26,82,118,.25); }
        .btn-login { background: #1a5276; border-color: #1a5276; width: 100%; padding: .7rem; font-weight: 600; }
        .btn-login:hover { background: #0e3449; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h2><i class="bi bi-bank2"></i> SIPRE</h2>
            <p>Sistema de Presupuesto<br>Municipio de Puerto López - Meta</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-sm">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    {{ form.username }}
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    {{ form.password }}
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'register' %}" class="text-muted">Crear cuenta nueva</a>
        </div>
    </div>
</body>
</html>
